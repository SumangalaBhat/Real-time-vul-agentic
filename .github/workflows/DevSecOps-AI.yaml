name: WebGoat DevSecOps + Agentic AI (Stable)

on:
  push:
  pull_request:

env:
  REPORT_DIR: reports
  FIX_DIR: ai-fixes

jobs:

# =========================
# 🔹 1. SETUP
# =========================
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare workspace
        run: |
          mkdir -p $REPORT_DIR $FIX_DIR

# =========================
# 🔹 2. GITGUARDIAN (Secrets)
# =========================
  gitguardian:
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run GitGuardian
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

# =========================
# 🔹 3. SEMGREP (Code Scan)
# =========================
  semgrep:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p $REPORT_DIR
          semgrep --config=auto --json > $REPORT_DIR/semgrep.json || echo "{}" > $REPORT_DIR/semgrep.json

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/

# =========================
# 🔹 4. DEPENDENCY CHECK
# =========================
  dependency:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: WebGoat
          path: .
          format: JSON
          out: reports

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports/

# =========================
# 🔹 5. SUMMARY (BEFORE FIX)
# =========================
  summary-before:
    runs-on: ubuntu-latest
    needs: [semgrep, dependency]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports

      - name: Generate Summary
        run: |
          echo "🚨 BEFORE FIX SUMMARY"
          echo "--------------------------------"

          TOTAL=$(jq '.results | length' reports/semgrep.json 2>/dev/null || echo 0)

          CRITICAL=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' reports/semgrep.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.results[] | select(.extra.severity=="WARNING")] | length' reports/semgrep.json 2>/dev/null || echo 0)

          echo "CRITICAL : $CRITICAL"
          echo "HIGH     : $HIGH"
          echo "TOTAL    : $TOTAL"

          echo "$TOTAL" > before_count.txt

      - uses: actions/upload-artifact@v4
        with:
          name: before-count
          path: before_count.txt

# =========================
# 🔹 6. AI FIX (OLLAMA)
# =========================
  ai-fix:
    runs-on: ubuntu-latest
    needs: semgrep

    permissions:
        contents: write
        pull-requests: write

    env:
      FIX_BRANCH: ai-fix-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports



      - name: Install & Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
      
          # Start Ollama in background
          nohup ollama serve > ollama.log 2>&1 &
      
          # Wait for server to be ready
          sleep 10
      
          # Pull model
          ollama pull llama3

      - name: Verify Ollama is running
        run: |
          curl http://localhost:11434 || (echo "Ollama failed to start" && exit 1)

    #  - name: AI Fix Vulnerabilities
     #   run: |
      #    mkdir -p ai-fixes
      
       #   FILES=$(jq -r '.results[].path' reports/semgrep.json | sort -u)
      
       #   for file in $FILES; do
        #    if [ -f "$file" ]; then
         #     echo "Fixing $file"
      
           #   FIXED=$(ollama run llama3 "
           #   Fix all security vulnerabilities (SQLi, XSS, etc).
           #   Return only fixed code.
              
            #  $(cat $file)
             # ")
              
                  #    mkdir -p $(dirname ai-fixes/$file)
                    #  echo "$FIXED" > ai-fixes/$file
                  #  fi
                 # done
    # =========================
    # 🔹 Create Branch
    # =========================
      - name: Create Fix Branch
        run: |
          git checkout -b $FIX_BRANCH

    # =========================
    # 🔹 Fix ONE Critical Issue
    # =========================
      - name: AI Fix (Create Duplicate File)
        run: |
          set -e
      
          mkdir -p ai-fixes
      
          echo "🔍 Selecting one CRITICAL vulnerability..."
      
          # ✅ Safe jq (no broken pipe)
          VULN=$(jq -c '[.results[] | select(.extra.severity=="ERROR")][0]' reports/semgrep.json)
      
          # ✅ Handle no vulnerability case
          if [ "$VULN" = "null" ] || [ -z "$VULN" ]; then
            echo "✅ No CRITICAL vulnerabilities found"
            exit 0
          fi
      
          FILE=$(echo "$VULN" | jq -r '.path')
          START=$(echo "$VULN" | jq -r '.start.line')
          END=$(echo "$VULN" | jq -r '.end.line')
      
          echo "📄 File: $FILE"
          echo "📍 Lines: $START - $END"
      
          # ✅ Validate file exists
          if [ ! -f "$FILE" ]; then
            echo "❌ File not found: $FILE"
            exit 1
          fi
      
          # ✅ Extract snippet safely
          SNIPPET=$(sed -n "${START},${END}p" "$FILE")
      
          if [ -z "$SNIPPET" ]; then
            echo "❌ Empty snippet, skipping"
            exit 1
          fi
      
          echo "⚠️ Vulnerable Code:"
          echo "$SNIPPET"
      
          echo "🤖 Fixing with Ollama..."
      
          FIXED=$(ollama run llama3:8b "
          Fix this CRITICAL security vulnerability in Java code.
          
          Requirements:
          - Prevent SQL Injection / XSS / insecure patterns
          - Keep logic intact
          - Return ONLY fixed code snippet
          
          Code:
          $SNIPPET
          ")
      
          if [ -z "$FIXED" ]; then
            echo "❌ AI did not return a fix"
            exit 1
          fi
      
          # ✅ Store inside ai-fixes directory (consistent)
          NEW_FILE="ai-fixes/${FILE%.java}_fixed.java"
      
          mkdir -p "$(dirname "$NEW_FILE")"
      
          echo "📝 Creating fixed file: $NEW_FILE"
      
          awk -v start="$START" -v end="$END" -v fix="$FIXED" '
            NR==start {print fix}
            NR<start || NR>end {print}
          ' "$FILE" > "$NEW_FILE"
      
          echo "✅ Fixed file created successfully"
      
          echo "📂 Files in ai-fixes:"
          ls -R ai-fixes

      - name: Upload Fixed Code
        uses: actions/upload-artifact@v4
        with:
          name: fixed-code
          path: ai-fixes/
    # =========================
    # 🔹 Commit & Push
    # =========================
      - name: Commit AI Fix Changes
        run: |
          git config user.name "SumangalaBhat"
          git config user.email "Sumangala.bhat18@gmail.com"
      
          echo "🔍 Checking target file..."
      
          # If FILE is empty, detect changed files automatically
          if [ -z "$FILE" ]; then
            echo "⚠️ FILE variable is empty. Auto-detecting changed files..."
      
            FILE=$(git status --porcelain | awk '{print $2}' | head -n 1)
          fi
      
          # If still empty → fallback to all changes
          if [ -z "$FILE" ]; then
            echo "⚠️ No specific file detected. Falling back to all changes."
            git add .
          else
            echo "📄 Target file: $FILE"
            git add "$FILE"
          fi
      
          echo "🔍 Detecting changes..."
      
          DIFF_OUTPUT=$(git diff --cached -U5 || true)
      
          echo "$DIFF_OUTPUT" > diff_output.txt
      
          echo "📌 Changed lines (with context):"
          echo "$DIFF_OUTPUT"
      
          LINE_INFO=$(echo "$DIFF_OUTPUT" | grep -E '^@@' || true)
      
          echo "📍 Line change summary:"
          echo "$LINE_INFO"
      
          # Skip if no changes
          if [ -z "$DIFF_OUTPUT" ]; then
            echo "⚠️ No changes detected, skipping commit."
            exit 0
          fi
      
          SHORT_DIFF=$(echo "$DIFF_OUTPUT" | head -n 50)
      
          git commit -m "🤖 AI Fix (Ollama): ${FILE:-multiple files} updated" \
                     -m "📍 Changed regions:" \
                     -m "$LINE_INFO" \
                     -m "🛠️ AI Agent: Ollama" \
                     -m "🔍 Diff Preview:" \
                     -m "$SHORT_DIFF"



    # =========================
    # 🔹 Create PR
    # =========================
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: $FIX_BRANCH
          title: "🤖 AI Security Fix (Duplicate File)"
          body: |
            ## 🚨 AI Generated Fix
  
            - Fixed one CRITICAL vulnerability
            - Original file unchanged
            - Secure version added as new file
  
            ### 📂 Changes
            - Added *_fixed.java file
  
            ⚠️ Please review before merging

# =========================
# 🔹 7. RE-SCAN AFTER FIX
# =========================
  rescan:
    runs-on: ubuntu-latest
    needs: ai-fix

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fixed-code
          path: fixed

      - name: Install Semgrep
        run: pip install semgrep

      - name: Re-run Scan
        run: |
          semgrep --config=auto fixed --json > after.json || echo "{}" > after.json

      - name: Count After Fix
        run: |
          AFTER=$(jq '.results | length' after.json 2>/dev/null || echo 0)
          echo "$AFTER" > after_count.txt

      - uses: actions/upload-artifact@v4
        with:
          name: after-count
          path: after_count.txt

# =========================
# 🔹 8. FINAL REPORT
# =========================
  final-report:
    runs-on: ubuntu-latest
    needs: [summary-before, rescan]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: before-count

      - uses: actions/download-artifact@v4
        with:
          name: after-count

      - name: Print Final Summary
        run: |
          BEFORE=$(cat before_count.txt)
          AFTER=$(cat after_count.txt)

          RESOLVED=$((BEFORE - AFTER))

          echo "🚨 FINAL VULNERABILITY REPORT"
          echo "--------------------------------"
          echo "Before Fix : $BEFORE"
          echo "After Fix  : $AFTER"
          echo "Resolved   : $RESOLVED"
          echo "--------------------------------"

          if [ "$AFTER" -gt 0 ]; then
            echo "⚠️ Vulnerabilities still exist!"
            exit 1
          else
            echo "✅ All vulnerabilities fixed"
          fi
