name: WebGoat DevSecOps + Agentic AI (Stable)

on:
  push:
  pull_request:

env:
  REPORT_DIR: reports
  FIX_DIR: ai-fixes

jobs:

# =========================
# 🔹 1. SETUP
# =========================
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare workspace
        run: |
          mkdir -p $REPORT_DIR $FIX_DIR

# =========================
# 🔹 2. GITGUARDIAN (Secrets)
# =========================
  gitguardian:
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run GitGuardian
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

# =========================
# 🔹 3. SEMGREP (Code Scan)
# =========================
  semgrep:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p $REPORT_DIR
          semgrep --config=auto --json > $REPORT_DIR/semgrep.json || echo "{}" > $REPORT_DIR/semgrep.json

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/

# =========================
# 🔹 4. DEPENDENCY CHECK
# =========================
  dependency:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: WebGoat
          path: .
          format: JSON
          out: reports

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports/

# =========================
# 🔹 5. SUMMARY (BEFORE FIX)
# =========================
  summary-before:
    runs-on: ubuntu-latest
    needs: [semgrep, dependency]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports

      - name: Generate Summary
        run: |
          echo "🚨 BEFORE FIX SUMMARY"
          echo "--------------------------------"

          TOTAL=$(jq '.results | length' reports/semgrep.json 2>/dev/null || echo 0)

          CRITICAL=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' reports/semgrep.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.results[] | select(.extra.severity=="WARNING")] | length' reports/semgrep.json 2>/dev/null || echo 0)

          echo "CRITICAL : $CRITICAL"
          echo "HIGH     : $HIGH"
          echo "TOTAL    : $TOTAL"

          echo "$TOTAL" > before_count.txt

      - uses: actions/upload-artifact@v4
        with:
          name: before-count
          path: before_count.txt

# =========================
# 🔹 6. AI FIX (OLLAMA)
# =========================
  ai-fix:
    runs-on: ubuntu-latest
    needs: semgrep

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama pull llama3

      - name: Apply AI Fixes
        run: |
          mkdir -p $FIX_DIR

          FILES=$(jq -r '.results[].path' reports/semgrep.json | sort -u)

          for file in $FILES; do
            if [ -f "$file" ]; then
              echo "Fixing $file"

              FIXED=$(ollama run llama3 "
              Fix all security vulnerabilities (SQLi, XSS, etc).
              Return only fixed code.
              
              $(cat $file)
              ")
              
                            mkdir -p $(dirname $FIX_DIR/$file)
                            echo "$FIXED" > $FIX_DIR/$file
                          fi
                        done
              
                    - uses: actions/upload-artifact@v4
                      with:
                        name: fixed-code
                        path: ai-fixes/

# =========================
# 🔹 7. RE-SCAN AFTER FIX
# =========================
  rescan:
    runs-on: ubuntu-latest
    needs: ai-fix

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fixed-code
          path: fixed

      - name: Install Semgrep
        run: pip install semgrep

      - name: Re-run Scan
        run: |
          semgrep --config=auto fixed --json > after.json || echo "{}" > after.json

      - name: Count After Fix
        run: |
          AFTER=$(jq '.results | length' after.json 2>/dev/null || echo 0)
          echo "$AFTER" > after_count.txt

      - uses: actions/upload-artifact@v4
        with:
          name: after-count
          path: after_count.txt

# =========================
# 🔹 8. FINAL REPORT
# =========================
  final-report:
    runs-on: ubuntu-latest
    needs: [summary-before, rescan]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: before-count

      - uses: actions/download-artifact@v4
        with:
          name: after-count

      - name: Print Final Summary
        run: |
          BEFORE=$(cat before_count.txt)
          AFTER=$(cat after_count.txt)

          RESOLVED=$((BEFORE - AFTER))

          echo "🚨 FINAL VULNERABILITY REPORT"
          echo "--------------------------------"
          echo "Before Fix : $BEFORE"
          echo "After Fix  : $AFTER"
          echo "Resolved   : $RESOLVED"
          echo "--------------------------------"

          if [ "$AFTER" -gt 0 ]; then
            echo "⚠️ Vulnerabilities still exist!"
            exit 1
          else
            echo "✅ All vulnerabilities fixed"
          fi
