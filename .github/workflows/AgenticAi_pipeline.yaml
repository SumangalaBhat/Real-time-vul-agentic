name: WebGoat DevSecOps + Agentic AI (Stable)

on:
  push:
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  REPORT_DIR: reports
  FIX_DIR: ai-fixes

jobs:

# =========================
# 🔹 1. SETUP
# =========================
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p $REPORT_DIR $FIX_DIR

# =========================
# 🔹 2. GITGUARDIAN
# =========================
  #gitguardian:
   # runs-on: ubuntu-latest
   # needs: setup
  #  continue-on-error: true

 #   steps:
   #   - uses: actions/checkout@v4
  #    - uses: GitGuardian/ggshield-action@v1
  #      env:
  #        GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

# =========================
# 🔹 3. SEMGREP
# =========================
  semgrep:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - run: pip install semgrep jq
      - run: |
          mkdir -p $REPORT_DIR
          semgrep --config=auto --json > $REPORT_DIR/semgrep.json || echo "{}" > $REPORT_DIR/semgrep.json

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/

# =========================
# 🔹 4. SUMMARY
# =========================
  summary-before:
    runs-on: ubuntu-latest
    needs: semgrep

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports

      - run: |
          TOTAL=$(jq '.results | length' reports/semgrep.json 2>/dev/null || echo 0)
          echo "$TOTAL" > before_count.txt

      - uses: actions/upload-artifact@v4
        with:
          name: before-count
          path: before_count.txt
  
  # =========================
  # 🔹 5. AI FIX (FULL AGENTIC)
  # =========================
  ai-fix:
    runs-on: ubuntu-latest
    needs: semgrep
  
    permissions:
      contents: write
      pull-requests: write
  
    env:
      FIX_BRANCH: ai-fix-${{ github.run_id }}
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports
  
      # =========================
      # 🔹 Prepare Git Branch
      # =========================
      - name: Prepare Git
        run: |
          git fetch origin
          git checkout -B $FIX_BRANCH
          git pull origin ${{ github.ref_name }} || true
  
      # =========================
      # 🔹 Install Ollama
      # =========================
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          nohup ollama serve > ollama.log 2>&1 &
          sleep 10
          ollama pull llama3
  
       # =========================
      # 🔹 AI FIX ENGINE (Sensitive Data Only)
      # =========================
      - name: AI Fix High Sensitive Data
        run: |
          set -e
      
          mkdir -p ai-fixes
          touch .env
      
          echo "🔍 Filtering HIGH sensitive data issues only..."
      
          # ✅ FILTER FIRST (Critical Fix)
          SENSITIVE=$(jq -c '
            .results[]
            | select(.extra.message | test("secret|token|password|api[_-]?key"; "i"))
          ' reports/semgrep.json)
      
          # ✅ Exit early if none
          if [ -z "$SENSITIVE" ]; then
            echo "✅ No sensitive data issues found"
            echo "skip_pr=true" >> $GITHUB_ENV
            exit 0
          fi
      
          echo "$SENSITIVE" | while read -r VULN; do
      
            FILE=$(echo "$VULN" | jq -r '.path')
            START=$(echo "$VULN" | jq -r '.start.line')
            END=$(echo "$VULN" | jq -r '.end.line')
      
            echo "🔐 Processing: $FILE ($START-$END)"
      
            # Validate file
            if [ ! -f "$FILE" ]; then
              echo "⚠️ File not found, skipping"
              continue
            fi
      
            SNIPPET=$(sed -n "${START},${END}p" "$FILE")
      
            if [ -z "$SNIPPET" ]; then
              echo "⚠️ Empty snippet, skipping"
              continue
            fi
      
            # =========================
            # 🔐 Extract Secret Safely
            # =========================
      
            VAR_LINE=$(echo "$SNIPPET" | grep -E '[a-zA-Z_][a-zA-Z0-9_]* *= *".+"' | head -1)
      
            if [ -z "$VAR_LINE" ]; then
              echo "⚠️ No assignable secret found, skipping"
              continue
            fi
      
            VAR_NAME=$(echo "$VAR_LINE" | cut -d '=' -f1 | tr -d ' ')
            VAR_VALUE=$(echo "$VAR_LINE" | sed -E 's/.*"([^"]+)".*/\1/')
      
            if [ -z "$VAR_NAME" ] || [ -z "$VAR_VALUE" ]; then
              echo "⚠️ Extraction failed, skipping"
              continue
            fi
      
            ENV_VAR=$(echo "$VAR_NAME" | tr '[:lower:]' '[:upper:]')
      
            echo "🔑 Extracted variable: $ENV_VAR"
      
            # =========================
            # 🔐 Store in .env (Base64 encoded)
            # =========================
      
            ENCODED=$(echo -n "$VAR_VALUE" | base64)
      
            if ! grep -q "^$ENV_VAR=" .env; then
              echo "$ENV_VAR=$ENCODED" >> .env
            fi
      
            # =========================
            # 🔁 Replace in Code Safely
            # =========================
      
            FIXED=$(echo "$SNIPPET" | sed \
              "s/\"$VAR_VALUE\"/new String(java.util.Base64.getDecoder().decode(System.getenv(\"$ENV_VAR\")))/g")
      
            if [ -z "$FIXED" ]; then
              echo "⚠️ Fix generation failed"
              continue
            fi
      
            # =========================
            # 📂 Write Fixed File
            # =========================
      
            NEW_FILE="ai-fixes/$FILE"
            mkdir -p "$(dirname "$NEW_FILE")"
      
            awk -v start="$START" -v end="$END" -v fix="$FIXED" '
              NR==start {print fix}
              NR<start || NR>end {print}
            ' "$FILE" > "$NEW_FILE"
      
            echo "✅ Fixed file created: $NEW_FILE"
      
          done
  
      # =========================
      # 🔹 Prepare Commit
      # =========================
      - name: Prepare Changes
        run: |
          echo ".env" >> .gitignore
          echo "reports/" >> .gitignore
          echo "ollama.log" >> .gitignore
  
          # Create safe template
          cp .env .env.example || true
          sed -i 's/=.*$/=REDACTED/' .env.example || true
  
          git add ai-fixes/ .env.example .gitignore
  
          if git diff --cached --quiet; then
            echo "skip_pr=true" >> $GITHUB_ENV
          fi
  
      # =========================
      # 🔹 Generate PR Details
      # =========================
      - name: Generate PR Details
        if: env.skip_pr != 'true'
        run: |
          echo "## 🤖 AI Security Fix Report" > pr_details.md
  
          FILES=$(git diff --cached --name-only)
  
          for file in $FILES; do
  
            DIFF=$(git diff --cached "$file" | head -n 150)
  
            PROMPT="Explain this fix:
            - vulnerability
            - risk
            - improvement
            
            $DIFF"
            
                      EXPLANATION=$(echo "$PROMPT" | ollama run llama3)
            
                      {
                        echo "### 📄 $file"
                        echo '```diff'
                        echo "$DIFF"
                        echo '```'
                        echo ""
                        echo "$EXPLANATION"
                        echo ""
                        echo "---"
                      } >> pr_details.md
            
                    done
  
      # =========================
      # 🔹 Create Pull Request
      # =========================
      - name: Create PR
        if: env.skip_pr != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.FIX_BRANCH }}
          base: ${{ github.ref_name }}
          title: "🤖 AI Security Fix (Automated)"
          body-path: pr_details.md
          commit-message: "🤖 AI Fix: vulnerabilities patched + secrets externalized"
          delete-branch: true

# =========================
# 🔹 6. RESCAN
# =========================
  rescan:
    runs-on: ubuntu-latest
    needs: ai-fix

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports

      - run: pip install semgrep jq

      - run: |
          semgrep --config=auto . --json > after.json || echo "{}" > after.json

      - run: |
          AFTER=$(jq '.results | length' after.json 2>/dev/null || echo 0)
          echo "$AFTER" > after_count.txt

      - uses: actions/upload-artifact@v4
        with:
          name: after-count
          path: after_count.txt

# =========================
# 🔹 7. FINAL REPORT
# =========================
  final-report:
    runs-on: ubuntu-latest
    needs: [summary-before, rescan]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: before-count

      - uses: actions/download-artifact@v4
        with:
          name: after-count

      - run: |
          BEFORE=$(cat before_count.txt)
          AFTER=$(cat after_count.txt)

          echo "Before: $BEFORE"
          echo "After : $AFTER"

          if [ "$AFTER" -gt 0 ]; then
            echo "⚠️ Issues remain"
            exit 1
          else
            echo "✅ All issues resolved"
          fi

# =========================
# 🔹 8. GITHUB PAGES REPORT
# =========================
  pages:
    runs-on: ubuntu-latest
    needs: final-report
  
    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: before-count
  
      - uses: actions/download-artifact@v4
        with:
          name: after-count
  
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports

    # =========================
    # 🔹 Generate HTML Dashboard
    # =========================
      - name: Generate HTML Report
        run: |
          BEFORE=$(cat before_count.txt)
          AFTER=$(cat after_count.txt)
          RESOLVED=$((BEFORE - AFTER))
  
          mkdir -p site
  
          cat <<EOF > site/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>DevSecOps AI Report</title>
            <style>
              body { font-family: Arial; margin: 40px; background: #0f172a; color: #e2e8f0; }
              h1 { color: #38bdf8; }
              .card { background: #1e293b; padding: 20px; margin: 10px 0; border-radius: 10px; }
              .good { color: #22c55e; }
              .bad { color: #ef4444; }
            </style>
          </head>
          <body>
            <h1>🚀 DevSecOps AI Security Report</h1>
  
            <div class="card">
              <h2>📊 Summary</h2>
              <p>Before Fix: <b class="bad">$BEFORE</b></p>
              <p>After Fix: <b class="good">$AFTER</b></p>
              <p>Resolved: <b>$RESOLVED</b></p>
            </div>
  
            <div class="card">
              <h2>🤖 AI Fix</h2>
              <p>Automated vulnerability remediation using Ollama</p>
            </div>
  
          </body>
          </html>
          EOF

    # =========================
    # 🔹 Upload Pages Artifact
    # =========================
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  
      # =========================
      # 🔹 Deploy to GitHub Pages
      # =========================
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
