name: WebGoat DevSecOps Pipeline

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

env:
  MAX_ITERATIONS: 2
  #FIX_BRANCH: ai-auto-fix-${{ github.run_id }}

jobs:

# =========================
# 🔹 1. CHECKOUT + BUILD
# =========================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: mvn clean install -DskipTests || true

# =========================
# 🔹 2. GET CHANGED FILES (PR ONLY)
# =========================
  changes:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changed.outputs.files }}

    steps:
      - uses: actions/checkout@v4

      - id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }} | grep '\.java$' || true)
          else
            FILES=$(git ls-files '*.java')
          fi

          echo "FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

# =========================
# 🔹 3. CODE SCAN (SMART)
# =========================
  code-scan:
    runs-on: ubuntu-latest
    needs: [build, changes]
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Advanced Real-Time Vulnerability Scan (FIXED)
        run: |
            mkdir -p reports
        
            echo -e "RULE\tSEVERITY\tFILE\tLINE\tCODE" > reports/report.tsv
        
            FILE_COUNT=0
            ISSUE_COUNT=0
        
            echo "🔍 Starting scan..."
        
            find . -type f \
              -not -path "./.git/*" \
              -not -path "./node_modules/*" \
              -not -path "./target/*" \
            | while read -r file; do
        
              FILE_COUNT=$((FILE_COUNT+1))
        
              # Skip binaries
              if file "$file" | grep -qi "binary"; then
                continue
              fi
        
              # 🔥 DIRECT PATTERN SCAN (more aggressive)
              grep -nEi \
              "password|secret|token|key|auth|credential|exec\(|eval\(|SELECT .* \+|BEGIN .*PRIVATE KEY|AKIA[0-9A-Z]{16}|https?://.*:.*@" \
              "$file" 2>/dev/null | while IFS= read -r line; do
        
                LINE_NO=$(echo "$line" | cut -d: -f1)
                CODE=$(echo "$line" | cut -d: -f2-)
        
                RULE="Sensitive Data Exposure"
                SEV="MEDIUM"
        
                # 🔐 classify better
                if echo "$CODE" | grep -qi "BEGIN .*PRIVATE KEY"; then
                  RULE="Private Key Exposure"; SEV="CRITICAL"
        
                elif echo "$CODE" | grep -qiE "AKIA[0-9A-Z]{16}"; then
                  RULE="AWS Key Exposure"; SEV="CRITICAL"
        
                elif echo "$CODE" | grep -qiE "password|secret|token"; then
                  RULE="Hardcoded Secret"; SEV="HIGH"
        
                elif echo "$CODE" | grep -qi "exec("; then
                  RULE="Command Injection"; SEV="HIGH"
        
                elif echo "$CODE" | grep -qiE "SELECT .* \+"; then
                  RULE="SQL Injection"; SEV="HIGH"
        
                elif echo "$CODE" | grep -qiE "eval\("; then
                  RULE="Unsafe Code Execution"; SEV="HIGH"
        
                elif echo "$CODE" | grep -qiE "https?://.*:.*@"; then
                  RULE="Credential in URL"; SEV="HIGH"
                fi
        
                echo -e "$RULE\t$SEV\t$file\t$LINE_NO\t$CODE"
                ISSUE_COUNT=$((ISSUE_COUNT+1))
        
              done
        
              # 🔐 ENTROPY CHECK (relaxed)
              grep -nE '[A-Za-z0-9+/=]{16,}' "$file" 2>/dev/null | while IFS= read -r line; do
                LINE_NO=$(echo "$line" | cut -d: -f1)
                CODE=$(echo "$line" | cut -d: -f2-)
        
                echo -e "Possible Secret (Entropy)\tHIGH\t$file\t$LINE_NO\t$CODE"
                ISSUE_COUNT=$((ISSUE_COUNT+1))
              done
        
            done >> reports/code.tsv
        
            echo "📊 Scan completed"
            echo "Files scanned: $FILE_COUNT"
            echo "Issues found: $ISSUE_COUNT"
        
            # 🔥 FORCE visibility if empty
            if [ "$ISSUE_COUNT" -eq 0 ]; then
              echo "No issues found — adding debug marker"
              echo -e "INFO\tLOW\tN/A\t0\tNo vulnerabilities detected" >> reports/code.tsv
            fi

      - name: Real Vulnerability Scan (DEBUG VERSION)
        run: |
          mkdir -p reports
          echo -e "RULE\tSEVERITY\tFILE\tLINE\tCODE" > reports/report.tsv
      
          FILE_COUNT=0
          ISSUE_COUNT=0
      
          echo "🔍 Scanning ALL files..."
      
          for file in $(find . -type f); do
            FILE_COUNT=$((FILE_COUNT+1))
      
            # Skip binaries safely
            if file "$file" | grep -qi "binary"; then
              continue
            fi
      
            # 🔥 VERY SIMPLE TEST (to prove scan works)
            if grep -q "password" "$file"; then
              echo -e "Hardcoded Secret\tHIGH\t$file\t1\tFound password" >> reports/report.tsv
              ISSUE_COUNT=$((ISSUE_COUNT+1))
            fi
      
            if grep -q "SELECT" "$file"; then
              echo -e "SQL Injection Risk\tHIGH\t$file\t1\tFound SQL" >> reports/report.tsv
              ISSUE_COUNT=$((ISSUE_COUNT+1))
            fi
      
            if grep -q "AKIA" "$file"; then
              echo -e "AWS Key Exposure\tCRITICAL\t$file\t1\tFound AWS Key" >> reports/report.tsv
              ISSUE_COUNT=$((ISSUE_COUNT+1))
            fi
      
          done
      
          echo "📊 Files scanned: $FILE_COUNT"
          echo "🚨 Issues found: $ISSUE_COUNT"
      
          if [ "$ISSUE_COUNT" -eq 0 ]; then
            echo "❌ STILL ZERO → SCAN IS NOT WORKING"
            echo "👉 Add test vulnerability manually"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: code-report
          path: reports/code.tsv

      - name: Print Complete Vulnerability Report
        run: |
          echo "📊 ========= FULL VULNERABILITY REPORT ========="
      
          if [ ! -f reports/report.tsv ]; then
            echo "❌ ERROR: report.tsv not found"
            exit 1
          fi
      
          echo ""
          echo "📄 RAW DATA:"
          echo "---------------------------------------------"
          cat reports/report.tsv || true
      
          echo ""
          echo "📊 SUMMARY:"
          echo "---------------------------------------------"
      
          # Remove header for counting
          DATA=$(tail -n +2 reports/report.tsv)
      
          CRITICAL=$(echo "$DATA" | grep -c $'\tCRITICAL\t' || true)
          HIGH=$(echo "$DATA" | grep -c $'\tHIGH\t' || true)
          MEDIUM=$(echo "$DATA" | grep -c $'\tMEDIUM\t' || true)
          LOW=$(echo "$DATA" | grep -c $'\tLOW\t' || true)
      
          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))
      
          echo ""
          echo "🚨 Vulnerability Summary"
          echo "--------------------------------"
          echo "CRITICAL : $CRITICAL"
          echo "HIGH     : $HIGH"
          echo "MEDIUM   : $MEDIUM"
          echo "LOW      : $LOW"
          echo "--------------------------------"
          echo "TOTAL    : $TOTAL"
      
          echo ""
          echo "📌 RULE-WISE BREAKDOWN"
          echo "--------------------------------"
          echo "$DATA" | cut -f1 | sort | uniq -c | sort -nr || true
      
          echo ""
          echo "📂 FILE-WISE DISTRIBUTION"
          echo "--------------------------------"
          echo "$DATA" | cut -f3 | sort | uniq -c | sort -nr || true
      
          echo ""
          echo "🔎 TOP 10 ISSUES"
          echo "--------------------------------"
          echo "$DATA" | head -10 || true
      
          # ✅ GitHub Summary UI
          {
            echo "## 🚨 DevSecOps Vulnerability Summary"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|--------|"
            echo "| 🔴 CRITICAL | $CRITICAL |"
            echo "| 🟠 HIGH     | $HIGH |"
            echo "| 🟡 MEDIUM   | $MEDIUM |"
            echo "| 🟢 LOW      | $LOW |"
            echo "| **TOTAL**  | **$TOTAL** |"
          } >> $GITHUB_STEP_SUMMARY

# =========================
# 🔹 4. DEPENDENCY SCAN
# =========================
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.deb
          sudo dpkg -i trivy_0.69.3_Linux-64bit.deb

      - name: Run Trivy
        run: |
          mkdir -p reports
          trivy fs --format json -o reports/trivy.json .

      - uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports/trivy.json

# =========================
# 🔹 5. AUTHOR MAPPING
# =========================
  author-mapping:
    runs-on: ubuntu-latest
    needs: code-scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports

      - name: Map Authors
        run: |
          OUTPUT=reports/owners.tsv
          echo -e "RULE\tSEV\tFILE\tLINE\tAUTHOR\tCOMMIT" > $OUTPUT

          while IFS=$'\t' read -r R S F L C; do
            BLAME=$(git blame -L $L,$L "$F" 2>/dev/null || true)
            AUTHOR=$(echo "$BLAME" | cut -d'(' -f2 | cut -d' ' -f1)
            COMMIT=$(echo "$BLAME" | awk '{print $1}')

            echo -e "$R\t$S\t$F\t$L\t${AUTHOR:-Unknown}\t${COMMIT:-N/A}"
          done < reports/code.tsv >> $OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: owner-report
          path: reports/owners.tsv

# =========================
# 🔹 6. SECURITY GATE (SMART)
  # =========================
  security-gate:
    runs-on: ubuntu-latest
    needs: code-scan
  
    outputs:
      high: ${{ steps.check.outputs.high }}
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports
  
      - id: check
        run: |
          HIGH=$(grep -c $'\tHIGH\t' reports/code.tsv || true)
  
          echo "HIGH=$HIGH"
          echo "high=$HIGH" >> $GITHUB_OUTPUT

# =========================
# 🔹 7. PR COMMENT (REAL-TIME)
# =========================
  pr-comment:
    runs-on: ubuntu-latest
    needs: [author-mapping, security-gate]
    if: always() && github.event_name == 'pull_request'
  
    permissions:
      pull-requests: write
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owner-report
          path: reports
  
      - name: Safe check
        run: |
          if [ ! -f reports/owners.tsv ]; then
            echo "⚠️ No report found"
            echo "EMPTY" > reports/owners.tsv
          fi
  
      - name: Count vulnerabilities
        id: check
        run: |
          COUNT=$(grep -c $'\tHIGH\t' reports/owners.tsv || true)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
  
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
  
            let data = fs.readFileSync('reports/owners.tsv','utf8');
  
            const high = "${{ needs.security-gate.outputs.high }}";
  
            const body = `
            🚨 **Security Scan Result**
            
            🔴 High Vulnerabilities: ${high}
            
            ${data ? "```" + data.substring(0,5000) + "```" : "No issues found"}
            `;
  
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

# =========================
# 🔹 8. HTML REPORT (ENHANCED)
# =========================
  report:
    runs-on: ubuntu-latest
    needs: [author-mapping, dependency-scan]
    if: always()
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owner-report
          path: reports
  
      - name: Calculate Severity Counts
        run: |
          HIGH=$(grep -c $'\tHIGH\t' reports/owners.tsv || true)
          MEDIUM=$(grep -c $'\tMEDIUM\t' reports/owners.tsv || true)
          LOW=$(grep -c $'\tLOW\t' reports/owners.tsv || true)
  
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV
      - name: Generate Advanced HTML Report
        run: |
          mkdir -p public
      
          cat <<EOF > public/index.html
          <html>
          <head>
            <title>🚀 DevSecOps Report</title>
            <style>
              body { font-family: Arial; text-align: center; }
              h1 { color: #333; }
              .card { padding:20px; margin:10px; display:inline-block; border-radius:10px; width:150px; }
              .high { background:red; color:white; }
              .medium { background:orange; color:black; }
              .low { background:green; color:white; }
          
              table { border-collapse: collapse; margin:20px auto; width:90%; }
              th, td { border:1px solid #ddd; padding:8px; }
              th { background:#333; color:white; }
            </style>
          </head>
          <body>
          
          <h1>🚀 WebGoat Security Report</h1>
          
          <div class="card high">HIGH: $HIGH</div>
          <div class="card medium">MEDIUM: $MEDIUM</div>
          <div class="card low">LOW: $LOW</div>
          
          <h2>🔴 HIGH Vulnerabilities</h2>
          <table>
          <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
          EOF
          
              awk -F '\t' '$2=="HIGH" {
                printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
              }' reports/owners.tsv >> public/index.html
          
              cat <<EOF >> public/index.html
          </table>
          
          <h2>🟠 MEDIUM Vulnerabilities</h2>
          <table>
          <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
          EOF
          
              awk -F '\t' '$2=="MEDIUM" {
                printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
              }' reports/owners.tsv >> public/index.html
          
              cat <<EOF >> public/index.html
          </table>
          
          <h2>🟢 LOW Vulnerabilities</h2>
          <table>
          <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
          EOF
          
              awk -F '\t' '$2=="LOW" {
                printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
              }' reports/owners.tsv >> public/index.html
          
              echo "</table></body></html>" >> public/index.html
  
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public







