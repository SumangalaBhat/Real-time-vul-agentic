name: 🔐 WebGoat DevSecOps Pipeline

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

jobs:

# =========================
# 🔹 1. CHECKOUT + BUILD
# =========================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: mvn clean install -DskipTests || true

# =========================
# 🔹 2. GET CHANGED FILES (PR ONLY)
# =========================
  changes:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changed.outputs.files }}

    steps:
      - uses: actions/checkout@v4

      - id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }} | grep '\.java$' || true)
          else
            FILES=$(git ls-files '*.java')
          fi

          echo "FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

# =========================
# 🔹 3. CODE SCAN (SMART)
# =========================
  code-scan:
    runs-on: ubuntu-latest
    needs: [changes, build]

    steps:
      - uses: actions/checkout@v4

      - name: Scan Changed Files (FIXED)
        run: |
          mkdir -p reports
      
          echo -e "RULE\tSEVERITY\tFILE\tLINE\tCODE" > reports/code.tsv
      
          echo "${{ needs.changes.outputs.files }}" | while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
      
            grep -nE "password|secret|token|exec\(|SELECT .* \+" "$file" | while IFS= read -r line; do
      
              LINE_NO=$(echo "$line" | cut -d: -f1)
              CODE=$(echo "$line" | cut -d: -f2-)
      
              if echo "$CODE" | grep -qiE "password\s*=|secret\s*="; then
                RULE="Hardcoded Secret"; SEV="HIGH"
      
              elif echo "$CODE" | grep -qi "exec("; then
                RULE="Command Injection"; SEV="HIGH"
      
              elif echo "$CODE" | grep -qi "SELECT .* \+"; then
                RULE="SQL Injection"; SEV="MEDIUM"
      
              else
                RULE="Code Smell"; SEV="LOW"
              fi
      
              echo -e "$RULE\t$SEV\t$file\t$LINE_NO\t$CODE"
      
            done
          done >> reports/code.tsv || true

      - uses: actions/upload-artifact@v4
        with:
          name: code-report
          path: reports/code.tsv

# =========================
# 🔹 4. DEPENDENCY SCAN
# =========================
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.deb
          sudo dpkg -i trivy_0.69.3_Linux-64bit.deb

      - name: Run Trivy
        run: |
          mkdir -p reports
          trivy fs --format json -o reports/trivy.json .

      - uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports/trivy.json

# =========================
# 🔹 5. AUTHOR MAPPING
# =========================
  author-mapping:
    runs-on: ubuntu-latest
    needs: code-scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports

      - name: Map Authors
        run: |
          OUTPUT=reports/owners.tsv
          echo -e "RULE\tSEV\tFILE\tLINE\tAUTHOR\tCOMMIT" > $OUTPUT

          while IFS=$'\t' read -r R S F L C; do
            BLAME=$(git blame -L $L,$L "$F" 2>/dev/null || true)
            AUTHOR=$(echo "$BLAME" | cut -d'(' -f2 | cut -d' ' -f1)
            COMMIT=$(echo "$BLAME" | awk '{print $1}')

            echo -e "$R\t$S\t$F\t$L\t${AUTHOR:-Unknown}\t${COMMIT:-N/A}"
          done < reports/code.tsv >> $OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: owner-report
          path: reports/owners.tsv

# =========================
# 🔹 6. SECURITY GATE (SMART)
# =========================
  security-gate:
    runs-on: ubuntu-latest
    needs: code-scan

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports

      - name: Block PR if HIGH found
        run: |
          HIGH=$(grep -c $'\tHIGH\t' reports/code.tsv || true)

          if [ "$HIGH" -gt 0 ]; then
            echo "❌ HIGH vulnerabilities in changed code → BLOCKING"
            exit 1
          fi

# =========================
# 🔹 7. PR COMMENT (REAL-TIME)
# =========================
  pr-comment:
    runs-on: ubuntu-latest
    needs: [author-mapping, security-gate]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owner-report
          path: reports

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = fs.readFileSync('reports/owners.tsv','utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🚨 Security Issues Found:\n\n```" + data.substring(0,3000) + "```"
            });

# =========================
# 🔹 8. HTML REPORT
# =========================
  report:
    runs-on: ubuntu-latest
    needs: [author-mapping, dependency-scan, code-scan]
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owner-report
          path: reports

      - name: Generate HTML
        run: |
          mkdir -p public

          echo "<html><body><h1>WebGoat Security Report</h1><table border=1>" > public/index.html

          awk -F '\t' 'NR>1 {
            printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$2,$3,$5
          }' reports/owners.tsv >> public/index.html

          echo "</table></body></html>" >> public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public


