name: WebGoat DevSecOps Pipeline

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

env:
  MAX_ITERATIONS: 2
  FIX_BRANCH: ai-auto-fix-${{ github.run_id }}

jobs:

# =========================
# 🔹 1. CHECKOUT + BUILD
# =========================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: mvn clean install -DskipTests || true

# =========================
# 🔹 2. GET CHANGED FILES (PR ONLY)
# =========================
  changes:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changed.outputs.files }}

    steps:
      - uses: actions/checkout@v4

      - id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }} | grep '\.java$' || true)
          else
            FILES=$(git ls-files '*.java')
          fi

          echo "FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

# =========================
# 🔹 3. CODE SCAN (SMART)
# =========================
  code-scan:
    runs-on: ubuntu-latest
    needs: [changes, build]

    steps:
      - uses: actions/checkout@v4

      - name: Scan Changed Files (FIXED)
        run: |
          mkdir -p reports
      
          echo -e "RULE\tSEVERITY\tFILE\tLINE\tCODE" > reports/code.tsv
      
          echo "${{ needs.changes.outputs.files }}" | while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
      
            grep -nE "password|secret|token|exec\(|SELECT .* \+" "$file" | while IFS= read -r line; do
      
              LINE_NO=$(echo "$line" | cut -d: -f1)
              CODE=$(echo "$line" | cut -d: -f2-)
      
              if echo "$CODE" | grep -qiE "password\s*=|secret\s*="; then
                RULE="Hardcoded Secret"; SEV="HIGH"
      
              elif echo "$CODE" | grep -qi "exec("; then
                RULE="Command Injection"; SEV="HIGH"
      
              elif echo "$CODE" | grep -qi "SELECT .* \+"; then
                RULE="SQL Injection"; SEV="MEDIUM"
      
              else
                RULE="Code Smell"; SEV="LOW"
              fi
      
              echo -e "$RULE\t$SEV\t$file\t$LINE_NO\t$CODE"
      
            done
          done >> reports/code.tsv || true

      - uses: actions/upload-artifact@v4
        with:
          name: code-report
          path: reports/code.tsv

      - name: Prepare AI Fix Input
        run: |
          awk -F '\t' 'NR>1 {
            print "FILE: " $3 "\nLINE: " $4 "\nISSUE: " $1 "\nCODE: " $5 "\n---"
          }' reports/code.tsv > reports/fix-input.txt

# =========================
# 🔹 4. DEPENDENCY SCAN
# =========================
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.deb
          sudo dpkg -i trivy_0.69.3_Linux-64bit.deb

      - name: Run Trivy
        run: |
          mkdir -p reports
          trivy fs --format json -o reports/trivy.json .

      - uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports/trivy.json

# =========================
# 🔹 5. AUTHOR MAPPING
# =========================
  author-mapping:
    runs-on: ubuntu-latest
    needs: code-scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports

      - name: Map Authors
        run: |
          OUTPUT=reports/owners.tsv
          echo -e "RULE\tSEV\tFILE\tLINE\tAUTHOR\tCOMMIT" > $OUTPUT

          while IFS=$'\t' read -r R S F L C; do
            BLAME=$(git blame -L $L,$L "$F" 2>/dev/null || true)
            AUTHOR=$(echo "$BLAME" | cut -d'(' -f2 | cut -d' ' -f1)
            COMMIT=$(echo "$BLAME" | awk '{print $1}')

            echo -e "$R\t$S\t$F\t$L\t${AUTHOR:-Unknown}\t${COMMIT:-N/A}"
          done < reports/code.tsv >> $OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: owner-report
          path: reports/owners.tsv

# =========================
# 🔹 6. SECURITY GATE (SMART)
  # =========================
  security-gate:
    runs-on: ubuntu-latest
    needs: code-scan
  
    outputs:
      high: ${{ steps.check.outputs.high }}
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports
  
      - id: check
        run: |
          HIGH=$(grep -c $'\tHIGH\t' reports/code.tsv || true)
  
          echo "HIGH=$HIGH"
          echo "high=$HIGH" >> $GITHUB_OUTPUT

# =========================
# 🔹 7. PR COMMENT (REAL-TIME)
# =========================
  pr-comment:
    runs-on: ubuntu-latest
    needs: [author-mapping, security-gate]
    if: always() && github.event_name == 'pull_request'
  
    permissions:
      pull-requests: write
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owner-report
          path: reports
  
      - name: Safe check
        run: |
          if [ ! -f reports/owners.tsv ]; then
            echo "⚠️ No report found"
            echo "EMPTY" > reports/owners.tsv
          fi
  
      - name: Count vulnerabilities
        id: check
        run: |
          COUNT=$(grep -c $'\tHIGH\t' reports/owners.tsv || true)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
  
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
  
            let data = fs.readFileSync('reports/owners.tsv','utf8');
  
            const high = "${{ needs.security-gate.outputs.high }}";
  
            const body = `
            🚨 **Security Scan Result**
            
            🔴 High Vulnerabilities: ${high}
            
            ${data ? "```" + data.substring(0,5000) + "```" : "No issues found"}
            `;
  
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

# =========================
# 🔹 8. HTML REPORT (ENHANCED)
# =========================
  report:
    runs-on: ubuntu-latest
    needs: [author-mapping, dependency-scan]
    if: always()
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owner-report
          path: reports
  
      - name: Calculate Severity Counts
        run: |
          HIGH=$(grep -c $'\tHIGH\t' reports/owners.tsv || true)
          MEDIUM=$(grep -c $'\tMEDIUM\t' reports/owners.tsv || true)
          LOW=$(grep -c $'\tLOW\t' reports/owners.tsv || true)
  
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV
  
      - name: Generate Advanced HTML Report
        run: |
          mkdir -p public
      
              cat <<EOF > public/index.html
              <html>
              <head>
                <title>🚀 DevSecOps Report</title>
                <style>
                  body { font-family: Arial; text-align: center; }
                  h1 { color: #333; }
                  .card { padding:20px; margin:10px; display:inline-block; border-radius:10px; width:150px; }
                  .high { background:red; color:white; }
                  .medium { background:orange; color:black; }
                  .low { background:green; color:white; }
      
                  table { border-collapse: collapse; margin:20px auto; width:90%; }
                  th, td { border:1px solid #ddd; padding:8px; }
                  th { background:#333; color:white; }
                </style>
              </head>
              <body>
          
                  <h1>🚀 WebGoat Security Report</h1>
          
                  <div class="card high">HIGH: $HIGH</div>
                  <div class="card medium">MEDIUM: $MEDIUM</div>
                  <div class="card low">LOW: $LOW</div>
          
                  <h2>🔴 HIGH Vulnerabilities</h2>
                  <table>
                  <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
                  EOF
          
                  awk -F '\t' '$2=="HIGH" {
                    printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
                  }' reports/owners.tsv >> public/index.html
          
                  cat <<EOF >> public/index.html
                  </table>
          
                  <h2>🟠 MEDIUM Vulnerabilities</h2>
                  <table>
                  <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
                  EOF
          
                  awk -F '\t' '$2=="MEDIUM" {
                    printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
                  }' reports/owners.tsv >> public/index.html
          
                  cat <<EOF >> public/index.html
                  </table>
          
                  <h2>🟢 LOW Vulnerabilities</h2>
                  <table>
                  <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
                  EOF
      
              awk -F '\t' '$2=="LOW" {
                printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
              }' reports/owners.tsv >> public/index.html
      
              echo "</table></body></html>" >> public/index.html
  
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

# =========================
# 🔹 9. Agentic-pipeline
# =========================
  ai-agentic-pipeline:
    runs-on: ubuntu-latest
    needs: code-scan
  
    env:
      MAX_ITERATIONS: 2
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Download Scan Report
        uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports
  
      - name: Setup
        run: |
          mkdir -p ai-fixes reports/iterations
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip jq
          pip3 install requests



    # =========================
    # 🔁 ITERATIVE AGENT LOOP
    # =========================
      - name: Run Agent Loop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os, requests, json, shutil
  
          API_KEY = os.getenv("OPENAI_API_KEY")
          MAX_ITER = int(os.getenv("MAX_ITERATIONS", 2))
  
          def call_ai(system, user):
              url = "https://api.openai.com/v1/chat/completions"
              headers = {
                  "Authorization": "Bearer " + API_KEY,
                  "Content-Type": "application/json"
              }
              data = {
                  "model": "gpt-4o-mini",
                  "temperature": 0.2,
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user", "content": user}
                  ]
              }
              res = requests.post(url, headers=headers, json=data)
              return res.json()["choices"][0]["message"]["content"]
  
          def parse_tsv():
              issues = []
              with open("reports/code.tsv") as f:
                  next(f)
                  for line in f:
                      parts = line.strip().split("\t")
                      if len(parts) < 5:
                          continue
                      issues.append({
                          "rule": parts[0],
                          "severity": parts[1],
                          "file": parts[2],
                          "line": parts[3],
                          "code": parts[4]
                      })
              return issues
  
          for iteration in range(MAX_ITER):
              print(f"🔁 Iteration {iteration+1}")
  
              issues = parse_tsv()
              if not issues:
                  print("✅ No vulnerabilities left")
                  break
  
              for issue in issues:
                  file_path = issue["file"]
  
                  if not os.path.exists(file_path):
                      continue
  
                  with open(file_path) as f:
                    code = f.read()





