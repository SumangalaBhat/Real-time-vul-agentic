name: WebGoat DevSecOps Pipeline

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

env:
  MAX_ITERATIONS: 2
  FIX_BRANCH: ai-auto-fix-${{ github.run_id }}

jobs:

# =========================
# 🔹 1. CHECKOUT + BUILD
# =========================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: mvn clean install -DskipTests || true

# =========================
# 🔹 2. GET CHANGED FILES (PR ONLY)
# =========================
  changes:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changed.outputs.files }}

    steps:
      - uses: actions/checkout@v4

      - id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }} | grep '\.java$' || true)
          else
            FILES=$(git ls-files '*.java')
          fi

          echo "FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

# =========================
# 🔹 3. CODE SCAN (SMART)
# =========================
  code-scan:
    runs-on: ubuntu-latest
    needs: [build, changes]
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Full Repo Secret & Vulnerability Scan
        run: |
          mkdir -p reports
  
          echo -e "RULE\tSEVERITY\tFILE\tLINE\tCODE" > reports/code.tsv
  
          # 🔍 Scan entire repo (excluding .git & binaries)
          find . -type f \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./target/*" \
            -size -1M \
          | while read -r file; do
  
            # Skip non-text files
            if file "$file" | grep -q "binary"; then
              continue
            fi
  
            # 🔎 Search for sensitive patterns
          grep -nE '.' "$file" 2>/dev/null | while IFS= read -r line; do
      
          LINE_NO=$(echo "$line" | cut -d: -f1)
          CODE=$(echo "$line" | cut -d: -f2-)
        
          SEV=""
          RULE=""
        
          # 🔐 1. Detect structured secrets (keys, tokens, long strings)
          if echo "$CODE" | grep -Eq '["'\''][A-Za-z0-9+/=_-]{20,}["'\'']'; then
            RULE="Hardcoded Credential (Generic)"
            SEV="HIGH"
          fi
        
          # 🔐 2. High entropy detection (random-looking secrets)
          SECRET=$(echo "$CODE" | grep -Eo '[A-Za-z0-9+/=]{20,}' | head -n1)
        
          if [ -n "$SECRET" ]; then
            ENTROPY=$(echo "$SECRET" | fold -w1 | sort | uniq -c | awk '{
              p=$1/length("'"$SECRET"'"); 
              e+=-p*log(p)/log(2)
            } END {print e}')
        
            # Threshold ~4.0 → likely secret
            if awk "BEGIN {exit !($ENTROPY > 4.0)}"; then
              RULE="High Entropy Secret"
              SEV="HIGH"
            fi
          fi
        
          # 🔐 3. Private key / certificate detection
          if echo "$CODE" | grep -q "BEGIN .*PRIVATE KEY"; then
            RULE="Private Key Exposure"
            SEV="CRITICAL"
          fi
        
          # 🔐 4. Suspicious assignment patterns (generic, not keyword-based)
          if echo "$CODE" | grep -Eq '=\s*["'\''][^"'\'']{12,}["'\'']'; then
            [ -z "$RULE" ] && RULE="Suspicious Hardcoded Value" && SEV="MEDIUM"
          fi
        
          # 🔐 5. Command / SQL risks (keep these)
          if echo "$CODE" | grep -q "exec("; then
            RULE="Command Injection"
            SEV="HIGH"
          fi
        
          if echo "$CODE" | grep -qE "SELECT .* \+"; then
            RULE="SQL Injection"
            SEV="MEDIUM"
          fi
        
          # ✅ Only print if something detected
          if [ -n "$RULE" ]; then
            echo -e "$RULE\t$SEV\t$file\t$LINE_NO\t$CODE"
          fi
        
          done
          done >> reports/code.tsv || true

      - uses: actions/upload-artifact@v4
        with:
          name: code-report
          path: reports/code.tsv

# =========================
# 🔹 4. DEPENDENCY SCAN
# =========================
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.deb
          sudo dpkg -i trivy_0.69.3_Linux-64bit.deb

      - name: Run Trivy
        run: |
          mkdir -p reports
          trivy fs --format json -o reports/trivy.json .

      - uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports/trivy.json

# =========================
# 🔹 5. AUTHOR MAPPING
# =========================
  author-mapping:
    runs-on: ubuntu-latest
    needs: code-scan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports

      - name: Map Authors
        run: |
          OUTPUT=reports/owners.tsv
          echo -e "RULE\tSEV\tFILE\tLINE\tAUTHOR\tCOMMIT" > $OUTPUT

          while IFS=$'\t' read -r R S F L C; do
            BLAME=$(git blame -L $L,$L "$F" 2>/dev/null || true)
            AUTHOR=$(echo "$BLAME" | cut -d'(' -f2 | cut -d' ' -f1)
            COMMIT=$(echo "$BLAME" | awk '{print $1}')

            echo -e "$R\t$S\t$F\t$L\t${AUTHOR:-Unknown}\t${COMMIT:-N/A}"
          done < reports/code.tsv >> $OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: owner-report
          path: reports/owners.tsv

# =========================
# 🔹 6. SECURITY GATE (SMART)
  # =========================
  security-gate:
    runs-on: ubuntu-latest
    needs: code-scan
  
    outputs:
      high: ${{ steps.check.outputs.high }}
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: code-report
          path: reports
  
      - id: check
        run: |
          HIGH=$(grep -c $'\tHIGH\t' reports/code.tsv || true)
  
          echo "HIGH=$HIGH"
          echo "high=$HIGH" >> $GITHUB_OUTPUT

# =========================
# 🔹 7. PR COMMENT (REAL-TIME)
# =========================
  pr-comment:
    runs-on: ubuntu-latest
    needs: [author-mapping, security-gate]
    if: always() && github.event_name == 'pull_request'
  
    permissions:
      pull-requests: write
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owner-report
          path: reports
  
      - name: Safe check
        run: |
          if [ ! -f reports/owners.tsv ]; then
            echo "⚠️ No report found"
            echo "EMPTY" > reports/owners.tsv
          fi
  
      - name: Count vulnerabilities
        id: check
        run: |
          COUNT=$(grep -c $'\tHIGH\t' reports/owners.tsv || true)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
  
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
  
            let data = fs.readFileSync('reports/owners.tsv','utf8');
  
            const high = "${{ needs.security-gate.outputs.high }}";
  
            const body = `
            🚨 **Security Scan Result**
            
            🔴 High Vulnerabilities: ${high}
            
            ${data ? "```" + data.substring(0,5000) + "```" : "No issues found"}
            `;
  
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

# =========================
# 🔹 8. HTML REPORT (ENHANCED)
# =========================
  report:
    runs-on: ubuntu-latest
    needs: [author-mapping, dependency-scan]
    if: always()
  
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owner-report
          path: reports
  
      - name: Calculate Severity Counts
        run: |
          HIGH=$(grep -c $'\tHIGH\t' reports/owners.tsv || true)
          MEDIUM=$(grep -c $'\tMEDIUM\t' reports/owners.tsv || true)
          LOW=$(grep -c $'\tLOW\t' reports/owners.tsv || true)
  
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV
      - name: Generate Advanced HTML Report
        run: |
          mkdir -p public
      
          cat <<EOF > public/index.html
          <html>
          <head>
            <title>🚀 DevSecOps Report</title>
            <style>
              body { font-family: Arial; text-align: center; }
              h1 { color: #333; }
              .card { padding:20px; margin:10px; display:inline-block; border-radius:10px; width:150px; }
              .high { background:red; color:white; }
              .medium { background:orange; color:black; }
              .low { background:green; color:white; }
          
              table { border-collapse: collapse; margin:20px auto; width:90%; }
              th, td { border:1px solid #ddd; padding:8px; }
              th { background:#333; color:white; }
            </style>
          </head>
          <body>
          
          <h1>🚀 WebGoat Security Report</h1>
          
          <div class="card high">HIGH: $HIGH</div>
          <div class="card medium">MEDIUM: $MEDIUM</div>
          <div class="card low">LOW: $LOW</div>
          
          <h2>🔴 HIGH Vulnerabilities</h2>
          <table>
          <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
          EOF
          
              awk -F '\t' '$2=="HIGH" {
                printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
              }' reports/owners.tsv >> public/index.html
          
              cat <<EOF >> public/index.html
          </table>
          
          <h2>🟠 MEDIUM Vulnerabilities</h2>
          <table>
          <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
          EOF
          
              awk -F '\t' '$2=="MEDIUM" {
                printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
              }' reports/owners.tsv >> public/index.html
          
              cat <<EOF >> public/index.html
          </table>
          
          <h2>🟢 LOW Vulnerabilities</h2>
          <table>
          <tr><th>Rule</th><th>File</th><th>Line</th><th>Author</th><th>Commit</th></tr>
          EOF
          
              awk -F '\t' '$2=="LOW" {
                printf "<tr><td>%s</td><td>%s</td><td>%s</td><td>%s</td><td>%s</td></tr>\n",$1,$3,$4,$5,$6
              }' reports/owners.tsv >> public/index.html
          
              echo "</table></body></html>" >> public/index.html
  
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public







